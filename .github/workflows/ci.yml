name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + tests + frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install Python deps
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check app scripts tests

      - name: Pytest
        run: uv run pytest -q

      - name: Install frontend deps
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Frontend lint
        run: pnpm --dir frontend run lint

      - name: Frontend build
        run: pnpm --dir frontend run build
